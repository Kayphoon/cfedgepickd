name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: true
      - run: go test ./...

  linux:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            suffix: linux-amd64
          - goarch: arm64
            suffix: linux-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: true
      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist/${{ matrix.suffix }}
          go build -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o dist/${{ matrix.suffix }}/cfedgepickd ./cmd/cfedgepickd
          go build -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o dist/${{ matrix.suffix }}/cfedgepickctl ./cmd/cfedgepickctl
          cp README.md dist/${{ matrix.suffix }}/
          cp deploy/install.sh dist/${{ matrix.suffix }}/
          cp configs/cfedgepickd.example.json dist/${{ matrix.suffix }}/
          tar -C dist/${{ matrix.suffix }} -czf dist/cfedgepickd-${{ matrix.suffix }}.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: cfedgepickd-${{ matrix.suffix }}
          path: dist/cfedgepickd-${{ matrix.suffix }}.tar.gz


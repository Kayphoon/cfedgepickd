name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: true
      - name: Check formatting
        run: make fmt-check
      - name: Test
        run: make test

  dist:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: true
      - name: Compute version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          else
            ref="${GITHUB_REF_NAME//\//-}"
            version="${ref}-${GITHUB_SHA::7}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
      - name: Build release archives
        run: make dist VERSION="${{ steps.version.outputs.version }}"
      - uses: actions/upload-artifact@v4
        with:
          name: cfpick-dist
          path: |
            dist/cfpick-linux-amd64.tar.gz
            dist/cfpick-linux-arm64.tar.gz
            dist/checksums.txt
            dist/install.sh
          if-no-files-found: error
          retention-days: 14

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: dist
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: cfpick-dist
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/cfpick-linux-amd64.tar.gz
            dist/cfpick-linux-arm64.tar.gz
            dist/checksums.txt
            dist/install.sh
